<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KPI Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/kpi.css" />
</head>
<body>
  <!--
    Single root for both viz mode (card) and dialog mode (?dialog=1 settings form).
    JS switches between them on boot.
  -->
  <div id="root"></div>

  <script>
    // HTTPS = Tableau Desktop → load the real Extensions API library (served locally).
    // HTTP  = local dev preview → load the stub that mocks the API.
    (function () {
      var s = document.createElement("script");
      s.src = location.protocol === "https:"
        ? "/tableau.extensions.1.latest.min.js"
        : "/src/dev/tableauStub.js";
      s.onload = function () {
        var m = document.createElement("script");
        m.src = "/src/main.js";
        document.head.appendChild(m);
      };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
